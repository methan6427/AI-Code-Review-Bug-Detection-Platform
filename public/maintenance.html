<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Site under maintenance</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f5;
        color: #18181b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(24, 24, 27, 0.08), transparent 40%),
          linear-gradient(180deg, #fafafa 0%, #f4f4f5 100%);
      }

      main {
        width: min(100%, 560px);
        padding: 40px 32px;
        border: 1px solid rgba(24, 24, 27, 0.08);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(24, 24, 27, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.75rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.6;
        color: #3f3f46;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Site under maintenance</h1>
      <p>We're performing scheduled work right now. Please check back shortly.</p>
    </main>
  </body>
</html>
